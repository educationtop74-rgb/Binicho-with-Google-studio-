<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINARIYO AI | Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #08090D; color: white; overflow: hidden; }
        .chat-container { background-color: #15181F; scroll-behavior: smooth; }
        .input-box { background: rgba(21, 24, 31, 0.8); backdrop-filter: blur(20px); border: 1px solid #2A2F38; }
        .message-ai { border-left: 2px solid #F5B942; background: rgba(255, 255, 255, 0.02); }
        .typing-pulse { width: 8px; height: 8px; background-color: #22C55E; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="flex h-screen flex-col">
    <!-- Header -->
    <header class="p-4 flex justify-between items-center border-b border-[#2A2F38] bg-[#08090D]">
        <div class="flex items-center gap-2">
            <div class="w-6 h-6 bg-[#22C55E] rounded flex items-center justify-center text-black font-bold text-xs">B</div>
            <span class="font-bold tracking-tighter text-sm">BINARIYO AI</span>
        </div>
        <div class="flex items-center gap-2 text-[10px] text-gray-500">
            <span class="w-2 h-2 rounded-full bg-[#22C55E]"></span> ONLINE
        </div>
    </header>

    <!-- Chat Area -->
    <main id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-6 chat-container">
        <div id="greeting" class="h-full flex flex-col items-center justify-center text-center">
            <h2 class="text-2xl font-light text-gray-400">What shall we build today?</h2>
        </div>
    </main>

    <!-- Input Area -->
    <div class="p-4 bg-[#08090D]">
        <div class="max-w-4xl mx-auto flex items-end gap-2 input-box p-2 rounded-2xl">
            <textarea id="user-input" rows="1" placeholder="Describe your vision..." class="flex-1 bg-transparent border-none focus:ring-0 p-2 text-sm outline-none resize-none"></textarea>
            <button onclick="sendMessage()" class="p-3 bg-[#22C55E] text-black rounded-xl shadow-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            const greeting = document.getElementById('greeting');
            const text = input.value.trim();

            if (!text) return;
            if (greeting) greeting.style.display = 'none';

            // User Message
            const userDiv = document.createElement('div');
            userDiv.className = "flex justify-end mb-4";
            userDiv.innerHTML = `<div class="max-w-[80%] bg-[#08090D] p-3 rounded-2xl text-sm border border-[#2A2F38]">${text}</div>`;
            chatWindow.appendChild(userDiv);
            input.value = "";

            // Loading
            const loadingDiv = document.createElement('div');
            loadingDiv.className = "flex gap-3 items-center mb-4";
            loadingDiv.innerHTML = `<div class="w-6 h-6 rounded bg-[#22C55E]/10 flex items-center justify-center text-[8px] text-[#22C55E]">AI</div><div class="typing-pulse"></div>`;
            chatWindow.appendChild(loadingDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                chatWindow.removeChild(loadingDiv);

                const aiDiv = document.createElement('div');
                aiDiv.className = "flex gap-3 items-start message-ai p-3 rounded-xl mb-4";
                aiDiv.innerHTML = `<div class="w-6 h-6 rounded bg-[#F5B942]/10 flex items-center justify-center text-[8px] text-[#F5B942]">AI</div><div class="text-sm text-gray-300 flex-1">${data.reply}</div>`;
                chatWindow.appendChild(aiDiv);
            } catch (e) {
                chatWindow.removeChild(loadingDiv);
                alert("System error. Check API configuration.");
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
