<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINARIYO AI | Intelligence, Refined.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #08090D; color: #FFFFFF; scroll-behavior: smooth; }
        .glass { background: rgba(21, 24, 31, 0.8); backdrop-filter: blur(12px); border: 1px solid #2A2F38; }
        .gold-text { background: linear-gradient(90deg, #F5B942, #D4A017); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .emerald-glow { box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body>
    <!-- Nav -->
    <nav class="fixed w-full z-50 glass py-4 px-6 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-[#22C55E] rounded flex items-center justify-center font-bold text-black text-xl">B</div>
            <span class="text-xl font-bold tracking-widest uppercase">Binariyo <span class="text-[#22C55E]">AI</span></span>
        </div>
        <a href="app.html" class="bg-[#22C55E] text-black px-5 py-2 rounded-full font-bold text-sm emerald-glow">Launch App</a>
    </nav>

    <!-- Hero -->
    <section class="h-screen flex flex-col justify-center items-center text-center px-6">
        <div data-aos="fade-up">
            <span class="border border-[#22C55E]/30 text-[#22C55E] px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-6 inline-block">The Premium AI Workspace</span>
            <h1 class="text-5xl md:text-8xl font-bold mb-6 tracking-tighter">Intelligence, <span class="gold-text">Refined.</span></h1>
            <p class="text-gray-400 max-w-2xl text-lg mb-10">BINARIYO AI is a futuristic workspace designed for learning, coding, and creative excellence.</p>
            <div class="flex gap-4 justify-center">
                <a href="app.html" class="bg-[#22C55E] text-black px-8 py-4 rounded-xl font-bold hover:scale-105 transition">Start Creating</a>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script> AOS.init(); </script>
</body>
</html>
